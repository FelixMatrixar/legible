# Render Blueprint — SCALED layout (paid): api + three separate workers +
# static dashboard. Use this instead of render.yaml when the free all-in-one
# service starts OOMing on Chromium or you want independent scaling/restarts.
# To switch: rename this file to render.yaml (Blueprints only read that name).
#
# Cost note: background workers have no free instance type on Render —
# each worker below runs on Starter. agent-nav and structure-audit are the
# ones that genuinely benefit (each gets its own 512MB for Chromium);
# scorer is tiny but still needs a paid instance to exist as a worker.

envVarGroups:
  - name: legible-shared
    envVars:
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_MAX_RPM_PER_KEY
        value: "10"
      # Kafka backbone — Render can't host a broker; use Redpanda Serverless
      # or Confluent Cloud and paste the bootstrap URL + SASL creds here.
      - key: BUS_DRIVER
        value: kafka
      - key: KAFKA_BROKERS
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: KAFKA_SASL_MECHANISM
        value: scram-sha-256
      - key: KAFKA_SSL
        value: "true"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: BUS_POLL_MS
        value: "5000"
      - key: MAX_NAV_STEPS
        value: "8"
      - key: NAV_GOAL_TIMEOUT_MS
        value: "180000"

services:
  - type: web
    name: legible-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - fromGroup: legible-shared
      - key: INTERNAL_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: DASHBOARD_ORIGIN
        sync: false
      - key: SUBMIT_RATE_LIMIT_PER_MIN
        value: "30"
      - key: WS_TAIL_MS
        value: "2000"

  - type: worker
    name: legible-structure-audit
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    dockerContext: .
    dockerCommand: npx tsx services/structure-audit/src/index.ts
    plan: starter
    envVars:
      - fromGroup: legible-shared

  - type: worker
    name: legible-agent-nav
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    dockerContext: .
    dockerCommand: npx tsx services/agent-nav/src/index.ts
    plan: starter
    envVars:
      - fromGroup: legible-shared

  - type: worker
    name: legible-scorer
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    dockerContext: .
    dockerCommand: npx tsx services/scorer/src/index.ts
    plan: starter
    envVars:
      - fromGroup: legible-shared
      - key: WEBHOOK_URL
        sync: false

  - type: web
    name: legible-dashboard
    runtime: static
    rootDir: apps/dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      # The API's public URL, e.g. https://legible-api.onrender.com — Vite
      # bakes it in at build time, so redeploy the dashboard after setting it.
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
