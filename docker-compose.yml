services:
  # Local single-node Kafka-compatible broker (Redpanda: one binary, no
  # ZooKeeper). In the cloud, point KAFKA_BROKERS at Redpanda Serverless /
  # Confluent instead and this service isn't needed.
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      BUS_DRIVER: kafka
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    restart: unless-stopped

  structure-audit:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["npx", "tsx", "services/structure-audit/src/index.ts"]
    env_file: .env
    environment:
      BUS_DRIVER: kafka
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
    depends_on:
      - redpanda
    restart: unless-stopped

  agent-nav:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["npx", "tsx", "services/agent-nav/src/index.ts"]
    env_file: .env
    environment:
      BUS_DRIVER: kafka
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
    depends_on:
      - redpanda
    restart: unless-stopped

  scorer:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["npx", "tsx", "services/scorer/src/index.ts"]
    env_file: .env
    environment:
      BUS_DRIVER: kafka
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
    depends_on:
      - redpanda
    restart: unless-stopped
