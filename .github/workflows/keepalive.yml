name: keepalive

# Render free web services sleep after ~15 min without inbound HTTP; a
# sleeping service stops its Kafka consumers mid-batch. This ping keeps the
# all-in-one service warm. Delete this workflow if you move to the paid
# split layout (render.scaled.yaml) — paid instances never sleep.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          API_URL: ${{ secrets.LEGIBLE_API_URL }}
        run: curl -fsS --max-time 30 "$API_URL/api/health"
